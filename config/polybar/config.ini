[bar/bar]
bottom = true
fixed-center = true
height = 30
background = #1d2021
foreground = #fbf1c7

font-1 = DejaVu Sans:pixelsize=11;0
font-0 = JetBrainsMono Nerd Font:pixelsize=9;3
font-2 = JetBrainsMono Nerd Font:pixelsize=11;4

modules-left = title
modules-center = workspaces
modules-right = time

scroll-up = #workspaces.prev
scroll-down = #workspaces.next

[module/title]
type = internal/xwindow
label = %title%
label-maxlen = 50
label-empty = %{T3}󰚌 %{T-}
label-padding = 2
label-empty-padding = 2

[module/workspaces]
type = internal/bspwm
pin-workspaces = true
label-focused = "  "  
label-occupied = "  "  
label-empty = "  "
label-urgent = "  "  

[module/time]
type = internal/date
label-padding = 2
format-background = #b8bb26
format-foreground = #1d2021
date = %H:%M
date-alt = %A, %d %B %Y
